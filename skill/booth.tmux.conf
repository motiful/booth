# booth.tmux.conf — Booth supplemental config
# No prefix override — inherits user's ~/.tmux.conf prefix (or tmux default Ctrl-B)
# Loaded via source-file (not -f), so user's personal config is preserved

# --- Status Bar ---

set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=colour235,fg=colour248"

set -g status-left-length 30
set -g status-left "#[bg=colour22,fg=colour255,bold] BOOTH #[default] #S "

set -g status-right-length 80
set -g status-right "#[fg=colour245]#(bash ~/.claude/skills/booth-skill/scripts/booth-status.sh #{socket_path})#[default]"

# --- Quick Navigation ---

# prefix + d: 回 DJ
bind d run-shell 'tmux switch-client -t "$(tmux show -gvq @booth-dj 2>/dev/null || echo dj)"'

# prefix + w: 看 — 全屏切到 deck（Ctrl-B d 回来）
bind w run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh look'

# prefix + e: 瞄 — 右侧分屏，DJ 保留在左边（Ctrl-B x 关掉右半）
bind e run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh glance'

# prefix + S: session 树
bind S choose-tree -s

# prefix + n/p: 上下切 session
bind n switch-client -n
bind p switch-client -p

# --- Visual ---

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour255,bg=colour24,bold] #I:#W #[default]"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Behavior ---

set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
setw -g automatic-rename off
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
