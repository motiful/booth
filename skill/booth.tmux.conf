# booth.tmux.conf — Booth supplemental config
# No prefix override — inherits user's ~/.tmux.conf prefix (or tmux default Ctrl-B)
# Loaded via source-file (not -f), so user's personal config is preserved

# --- Status Bar ---

set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=colour235,fg=colour248"

set -g status-left-length 30
set -g status-left "#[bg=colour22,fg=colour255,bold] BOOTH #[default] #S "

set -g status-right-length 120
set -g status-right "#(bash ~/.claude/skills/booth-skill/scripts/booth-status.sh #{socket_path})#[default]"

# --- Mouse: click deck name in status bar to switch ---
# Status script wraps deck names in #[range=user|deckname].
# When clicked, #{mouse_status_range} = deckname → switch-client.
bind -T root MouseDown1StatusRight if -F "#{!=:#{mouse_status_range},}" {
  switch-client -t "#{mouse_status_range}"
}

# --- Quick Navigation (all prefix-based) ---

# prefix + d: back to DJ
bind d run-shell 'tmux -S "#{socket_path}" switch-client -t "$(tmux -S "#{socket_path}" show -gvq @booth-dj 2>/dev/null || echo dj)"'

# prefix + w: native tmux session tree (choose-tree) — browse, preview, switch
bind w choose-tree -s

# prefix + e: glance — split-pane with live deck viewer on right
bind e run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh glance "#{socket_path}"'

# prefix + S: session tree (alias for w)
bind S choose-tree -s

# prefix + n/p: cycle sessions
bind n switch-client -n
bind p switch-client -p

# --- Visual ---

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour255,bg=colour24,bold] #I:#W #[default]"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Behavior ---

set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
setw -g automatic-rename off
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
