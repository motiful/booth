# booth.tmux.conf — Booth 附加配置
# 不设 prefix — 继承用户 ~/.tmux.conf 的 prefix（或 tmux 默认 Ctrl-B）
# 通过 source-file 加载（不用 -f），用户个人配置不受影响

# --- Status Bar ---

set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=colour235,fg=colour248"

set -g status-left-length 30
set -g status-left "#[bg=colour22,fg=colour255,bold] BOOTH #[default] #S "

set -g status-right-length 80
set -g status-right "#[fg=colour245]#(bash ~/.claude/skills/booth-skill/scripts/booth-status.sh #{socket_path})#[default]"

# --- Quick Navigation ---

# prefix + d: 一键回 DJ
bind d run-shell 'tmux switch-client -t "$(tmux show -gvq @booth-dj 2>/dev/null || echo dj)"'

# prefix + w: deck 选择菜单 → peek 浮窗（不用打字，数字选择）
bind w run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh peek'

# prefix + W: deck 选择菜单 → 直接切过去
bind W run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh switch'

# prefix + S: 完整 session 树
bind S choose-tree -s

# prefix + n/p: 上下切 session
bind n switch-client -n
bind p switch-client -p

# --- Visual ---

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour255,bg=colour24,bold] #I:#W #[default]"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Behavior ---

set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
setw -g automatic-rename off
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
