# booth.tmux.conf — Booth supplemental config
# No prefix override — inherits user's ~/.tmux.conf prefix (or tmux default Ctrl-B)
# Loaded via source-file (not -f), so user's personal config is preserved

# --- Status Bar Layout ---
# Left:  [ BOOTH ] [ DJ ]     — DJ button: click to return
# Right: ●deck-1 ✓deck-2 …   — deck list with state indicators, click to switch

set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=colour235,fg=colour248"

# Left: BOOTH badge + DJ button (dynamic via @booth-status-left-extra)
set -g status-left-length 40
set -g status-left "#[bg=colour22,fg=colour255,bold] BOOTH #[default] #{E:@booth-status-left-extra} "

# Right: deck list with status indicators (dynamic via @booth-deck-status)
# #() triggers booth-status.sh (output unused); #{E:@booth-deck-status} renders content
set -g status-right-length 120
set -g status-right "#(bash ~/.claude/skills/booth-skill/scripts/booth-status.sh #{socket_path})#{E:@booth-deck-status}#[default]"

# --- Mouse: Click-to-Switch (first-class citizen) ---
# Left-click on any range-tagged name → switch to that session.
# Works for both DJ button (in status-left) and deck names (in status-right).
# Fallback: if no range, do default select-window.
bind -T root MouseDown1Status run-shell 'RANGE="#{mouse_status_range}"; if [ -n "$RANGE" ]; then tmux -S "#{socket_path}" switch-client -t "$RANGE"; else tmux select-window -t =; fi'
bind -T root MouseDown1StatusLeft run-shell 'RANGE="#{mouse_status_range}"; if [ -n "$RANGE" ]; then tmux -S "#{socket_path}" switch-client -t "$RANGE"; fi'
bind -T root MouseDown1StatusRight run-shell 'RANGE="#{mouse_status_range}"; if [ -n "$RANGE" ]; then tmux -S "#{socket_path}" switch-client -t "$RANGE"; fi'

# Right-click on a deck name → context menu (看/瞄/Send/Kill)
bind -T root MouseDown3Status run-shell 'RANGE="#{mouse_status_range}"; if [ -n "$RANGE" ]; then bash ~/.claude/skills/booth-skill/scripts/booth-context-menu.sh "$RANGE" "#{socket_path}"; fi'
bind -T root MouseDown3StatusRight run-shell 'RANGE="#{mouse_status_range}"; if [ -n "$RANGE" ]; then bash ~/.claude/skills/booth-skill/scripts/booth-context-menu.sh "$RANGE" "#{socket_path}"; fi'

# --- Quick Navigation (prefix-based) ---

# prefix + d: back to DJ
bind d run-shell 'tmux -S "#{socket_path}" switch-client -t "$(tmux -S "#{socket_path}" show -gvq @booth-dj 2>/dev/null || echo dj)"'

# prefix + w: native tmux session tree (choose-tree)
bind w choose-tree -s

# prefix + e: glance — split-pane with real deck session on right
bind e run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh glance "#{socket_path}"'

# prefix + S: session tree (alias for w)
bind S choose-tree -s

# prefix + n/p: cycle sessions
bind n switch-client -n
bind p switch-client -p

# --- Visual ---

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour255,bg=colour24,bold] #I:#W #[default]"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Behavior ---

set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
setw -g automatic-rename off
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
