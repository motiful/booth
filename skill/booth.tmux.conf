# booth.tmux.conf — Booth supplemental config
# No prefix override — inherits user's ~/.tmux.conf prefix (or tmux default Ctrl-B)
# Loaded via source-file (not -f), so user's personal config is preserved

# --- Status Bar Layout ---
# Left:  [ BOOTH ] [ DJ ]     — DJ button: click to return
# Right: ●deck-1 ✓deck-2 …   — deck list with state indicators, click to switch

set -g status on
set -g status-interval 2
set -g status-position bottom

set -g status-style "bg=colour235,fg=colour248"

# Left: BOOTH badge + DJ button — extra padding for wider click targets
set -g status-left-length 50
set -g status-left "#[bg=colour22,fg=colour255,bold]  BOOTH  #[default] #{E:@booth-status-left-extra}  "

# Right: deck list with wider click targets (padding added in booth-status.sh)
set -g status-right-length 150
set -g status-right "#(bash ~/.claude/skills/booth-skill/scripts/booth-status.sh #{socket_path})#{E:@booth-deck-status}#[default]"

# --- Mouse: Click-to-Switch ---
# IMPORTANT: User range tags (#[range=user|X]) ALWAYS fire MouseDown1Status,
# regardless of whether they appear in status-left or status-right.
# MouseDown1StatusLeft/Right only fire for NON-range areas.
bind -T root MouseDown1Status run-shell 'RANGE="#{mouse_status_range}"; case "$RANGE" in ""|left|right|status|window) ;; *) tmux -S "#{socket_path}" switch-client -t "$RANGE" 2>/dev/null;; esac'

# Click BOOTH badge (status-left non-range area) → management menu
bind -T root MouseDown1StatusLeft display-menu -M -O -T "#[align=centre,bold] BOOTH " -x M -y S \
  "New Deck"       n "command-prompt -p 'Deck name:' \"run-shell 'booth spawn %%'\"" \
  "Status"         s "run-shell 'booth ps'" \
  ""                 "" "" \
  "Choose Tree"    t "choose-tree -Zs" \
  ""                 "" "" \
  "#[fg=colour196]Shutdown" Q "confirm-before -p 'Shutdown Booth? (y/n)' 'kill-server'"

bind -T root MouseDown1StatusRight run-shell ''

# Middle-click on a deck name → confirm-kill
bind -T root MouseDown2Status run-shell 'RANGE="#{mouse_status_range}"; case "$RANGE" in ""|left|right|status|window) ;; *) tmux -S "#{socket_path}" confirm-before -p "Kill deck $RANGE? (y/n)" "kill-session -t $RANGE";; esac'

# Right-click on a deck name → context menu (看/瞄/Send/Kill)
bind -T root MouseDown3Status run-shell 'RANGE="#{mouse_status_range}"; case "$RANGE" in ""|left|right|status) ;; *) bash ~/.claude/skills/booth-skill/scripts/booth-context-menu.sh "$RANGE" "#{socket_path}";; esac'
bind -T root MouseDown3StatusRight run-shell 'RANGE="#{mouse_status_range}"; case "$RANGE" in ""|left|right|status) ;; *) bash ~/.claude/skills/booth-skill/scripts/booth-context-menu.sh "$RANGE" "#{socket_path}";; esac'

# --- Quick Navigation (prefix-based) ---

# prefix + d: back to DJ
bind d run-shell 'tmux -S "#{socket_path}" switch-client -t "$(tmux -S "#{socket_path}" show -gvq @booth-dj 2>/dev/null || echo dj)"'

# prefix + w: native tmux session tree (choose-tree)
bind w choose-tree -s

# prefix + e: glance — split-pane with real deck session on right
bind e run-shell 'bash ~/.claude/skills/booth-skill/scripts/booth-deck-menu.sh glance "#{socket_path}"'

# prefix + S: session tree (alias for w)
bind S choose-tree -s

# prefix + n/p: cycle sessions
bind n switch-client -n
bind p switch-client -p

# --- Visual ---

# Hide tmux's built-in window list — Booth uses status-left/right for its own UI
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Behavior ---

set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
setw -g automatic-rename off
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
