# booth.tmux.conf — Booth-specific tmux configuration
# Loaded via: tmux -L booth -f /path/to/booth.tmux.conf new-session ...
# Isolated from user's personal tmux config.

# --- Prefix Key: Ctrl-Space ---
# Booth 独立 socket，不影响用户个人 tmux 的 Ctrl-B
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Status Bar ---

set -g status on
set -g status-interval 5
set -g status-position bottom

# Default status bar style (decks get blue)
set -g status-style "bg=colour235,fg=colour248"

# Left: [BOOTH] + session name
set -g status-left-length 30
set -g status-left "#[bg=colour22,fg=colour255,bold] BOOTH #[default] #S "

# Right: active session count + prefix hint
set -g status-right-length 50
set -g status-right " #[fg=colour245]C-Space·d=DJ  sessions: #{server_sessions} #[default]"

# --- Quick Navigation ---

# prefix + d: 一键回 DJ (booth-main)
bind d switch-client -t booth-main

# prefix + S (uppercase): choose-tree to switch sessions
bind S choose-tree -s

# prefix + n/p: next/previous session
bind n switch-client -n
bind p switch-client -p

# prefix + (/): prev/next session (tmux defaults, ensure available)
bind ( switch-client -p
bind ) switch-client -n

# --- Deck Peek (display-popup) ---

# prefix + w: prompt for deck name, open peek popup
bind w command-prompt -p "Peek deck:" \
  "display-popup -E -xC -yC -w 85%% -h 75%% -T ' deck: %1 ' -b rounded \
   'bash ~/.claude/skills/booth-skill/scripts/booth-peek.sh %1'"

# prefix + W: choose from session list, open peek popup
bind W choose-tree -sN \
  "display-popup -E -xC -yC -w 85%% -h 75%% -T ' deck: %%' -b rounded \
   'bash ~/.claude/skills/booth-skill/scripts/booth-peek.sh %%'"

# --- Visual Distinction ---

# Window status format
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour255,bg=colour24,bold] #I:#W #[default]"

# Pane border colors
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Behavior ---

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Larger scrollback
set -g history-limit 10000

# Don't auto-rename windows
setw -g automatic-rename off

# Mouse support (useful for scrolling deck output)
set -g mouse on

# Fix for modern terminals
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
